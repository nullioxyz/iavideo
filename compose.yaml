services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    socketio:
        image: 'node:20-alpine'
        working_dir: /var/www/html
        command: sh -c "npm install && npm run socketio -- --dir=/var/www/html"
        environment:
            LARAVEL_ECHO_SERVER_AUTH_HOST: '${LARAVEL_ECHO_SERVER_AUTH_HOST:-http://laravel.test}'
            LARAVEL_ECHO_SERVER_AUTH_ENDPOINT: '${LARAVEL_ECHO_SERVER_AUTH_ENDPOINT:-/api/broadcasting/auth}'
            LARAVEL_ECHO_SERVER_HOST: '${LARAVEL_ECHO_SERVER_HOST:-0.0.0.0}'
            LARAVEL_ECHO_SERVER_PORT: '${LARAVEL_ECHO_SERVER_PORT:-6001}'
            LARAVEL_ECHO_SERVER_PROTO: '${LARAVEL_ECHO_SERVER_PROTO:-http}'
            LARAVEL_ECHO_SERVER_REDIS_HOST: '${LARAVEL_ECHO_SERVER_REDIS_HOST:-redis}'
            LARAVEL_ECHO_SERVER_REDIS_PORT: '${LARAVEL_ECHO_SERVER_REDIS_PORT:-6379}'
            LARAVEL_ECHO_SERVER_DEV_MODE: '${LARAVEL_ECHO_SERVER_DEV_MODE:-true}'
        ports:
            - '${FORWARD_SOCKET_IO_PORT:-6001}:6001'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - redis
            - laravel.test
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
